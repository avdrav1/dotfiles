# Snappy Switcher configuration
# Theme: Dos Moos (matches the Omarchy Dos Moos color scheme)

[general]
mode = context
show_workspace_badge = true
follow_monitor = true
sticky_mode = false

[theme]
name = dos-moos.ini
border_width = 2
corner_radius = 4

[layout]
card_width = 145
card_height = 135
card_gap = 10
padding = 10
max_cols = 5
icon_size = 57
icon_radius = 4
error_font_size = 13

[icons]
theme = Yaru-sage
fallback = hicolor
show_letter_fallback = true

[font]
family = JetBrainsMono Nerd Font
weight = Bold
title_size = 10
icon_letter_size = 24

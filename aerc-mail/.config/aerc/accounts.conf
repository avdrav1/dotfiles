# aerc accounts. Incoming = local Maildir (synced by mbsync); outgoing = msmtp.
# No passwords here — mbsync/msmtp fetch them from `pass`. aerc requires 0600.
# No copy-to: Gmail auto-saves SMTP-sent mail to "Sent Mail" (copy-to would dupe).

[av@lab828.com]
source   = maildir://~/.local/share/mail/av@lab828.com
outgoing = /usr/bin/msmtp -a av@lab828.com
from     = av@lab828.com
default  = INBOX
postpone = [Gmail]/Drafts
folders  = INBOX,[Gmail]/Sent Mail,[Gmail]/Drafts,[Gmail]/All Mail,[Gmail]/Trash


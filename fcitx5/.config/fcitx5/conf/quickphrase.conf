# fcitx5 "Quick Phrase" addon.
#
# Its default TriggerKey is Super+grave, which collides with the Hyprland
# workspace-overview bind of the same chord (omarchy-supplement:
# hypr/lua/scrolloverview.lua). Both fired on every press -- the overview
# opened AND fcitx5 popped its Quick Phrase prompt.
#
# An empty TriggerKey section unbinds the addon without disabling it, so the
# feature stays available from the fcitx5 config GUI if ever wanted.
#
# CAUTION: this file is a stow symlink into the dotfiles repo. Editing
# quickphrase settings through fcitx5-configtool rewrites the file via
# temp+rename, which REPLACES the symlink with a regular file and silently
# detaches it from the repo. Re-run `stow fcitx5` if that happens.
[TriggerKey]

